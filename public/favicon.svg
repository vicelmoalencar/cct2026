<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo circular azul escuro -->
  <circle cx="32" cy="32" r="32" fill="#1a237e"/>
  <!-- Anel vermelho decorativo -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#c0392b" stroke-width="3"/>
  <!-- Letras CCT -->
  <text x="32" y="26" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900"
        text-anchor="middle" fill="#ffffff" letter-spacing="1">CCT</text>
  <!-- Linha separadora vermelha -->
  <rect x="14" y="29" width="36" height="2" fill="#c0392b" rx="1"/>
  <!-- Subtexto -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="7" font-weight="bold"
        text-anchor="middle" fill="#90caf9" letter-spacing="0.5">CÁLCULO</text>
  <text x="32" y="51" font-family="Arial, sans-serif" font-size="6"
        text-anchor="middle" fill="#90caf9" letter-spacing="0.5">TRABALHISTA</text>
</svg>
